<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!--
      Everything is local: no network calls, no telemetry, no remote assets (§11).
      `connect-src 'self'` means an imported document cannot cause the app to phone
      home, and the architecture test asserts no source uses fetch/XHR/WebSocket.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' blob:; object-src 'none'; base-uri 'none'; form-action 'none'"
    />
    <title>CodebaseGuide — AgentsCommander</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
